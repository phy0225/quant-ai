[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试时使用内存数据库，不影响开发库
env =
    DATABASE_URL=sqlite:////:memory:
    LLM_API_KEY=
    DATA_PROVIDER=mock

# 输出格式
addopts =
    -v
    --tb=short
    --no-header
    -p no:warnings

# 忽略外部网络相关警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning